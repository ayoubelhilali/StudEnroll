server:
  port: 8060
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
          corsConfigurations:
            '[/**]':
              allowedOrigins: 
                - "http://localhost:5173"
                - "http://localhost:3000"
              allowedMethods:
                - GET
                - POST
                - DELETE
                - OPTIONS
              allowedHeaders: "*"
      routes:
        - id: student-service
          uri: lb://STUDENT-SERVICE
          predicates:
            - Path=/api/students/**
        - id: course-service
          uri: lb://COURSE-SERVICE
          predicates:
            - Path=/api/courses/**
        - id: enrollment-service
          uri: lb://ENROLLMENT-SERVICE
          predicates:
            - Path=/api/enrollments/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/